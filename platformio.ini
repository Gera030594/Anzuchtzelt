[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.31/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter, esp32_exception_decoder

lib_deps =
    ; NeoPixelBus declares SPI as package dependency; ESP32 Arduino provides the real SPI library.
    file://platformio_shims/SPI
    adafruit/Adafruit BME680 Library
    adafruit/Adafruit Unified Sensor
    adafruit/Adafruit BusIO
    makuna/NeoPixelBus
    bertmelis/espMqttClient @ 1.7.3

lib_ignore =
    WiFiNINA
